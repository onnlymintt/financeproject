<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Analysis - K62 FTU</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --soft-pink: #fff5f7;
            --deep-pink: #ff85a2;
            --accent-pink: #ffb3c1;
            --dark: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--white); overflow: hidden; height: 100vh; cursor: crosshair; }

        /* LAYER 1: CHUYÊN NGHIỆP (FINANCE) */
        #layer-finance {
            height: 100vh;
            display: flex;
            background: #fff;
            transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1);
            z-index: 100;
            position: relative;
        }

        .sidebar { width: 280px; border-right: 1px solid #eee; padding: 40px; }
        .main-panel { flex: 1; padding: 80px; display: flex; flex-direction: column; justify-content: center; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 40px 0; }
        .stat-card { background: #fcfcfc; padding: 30px; border-radius: 20px; border: 1px solid #eee; }

        .btn-unlock {
            width: fit-content;
            padding: 20px 50px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        .btn-unlock:hover { background: var(--deep-pink); transform: scale(1.05); box-shadow: 0 20px 40px rgba(255, 133, 162, 0.3); }

        /* LAYER 2: SURPRISE (THE PINK GALAXY) */
        #layer-surprise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #ffffff 0%, #fff0f3 100%);
            display: none;
            opacity: 0;
            z-index: 50;
            overflow-y: auto;
            perspective: 1000px;
            padding: 50px 20px;
        }

        /* 3D POLAROID */
        .polaroid-container {
            width: 350px;
            margin: 0 auto;
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }

        .polaroid-card {
            background: white;
            padding: 15px 15px 70px 15px;
            box-shadow: 0 30px 60px rgba(255, 133, 162, 0.2);
            border-radius: 2px;
            position: relative;
        }

        .polaroid-card img { width: 100%; height: 420px; object-fit: cover; }

        .disc-music {
            position: absolute;
            bottom: -30px;
            right: -30px;
            width: 100px;
            height: 100px;
            background: #333;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotate 4s linear infinite;
            animation-play-state: paused;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* TYPING MESSAGE BOX */
        .message-box {
            max-width: 700px;
            margin: 50px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            min-height: 200px;
            text-align: left;
            line-height: 1.8;
            font-size: 1.1rem;
            color: #444;
        }

        /* CUSTOM BUTTONS */
        .nav-buttons { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; }
        .btn-magic {
            background: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            font-weight: 700;
            color: var(--deep-pink);
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-magic:hover { transform: translateY(-5px); background: var(--deep-pink); color: white; }

        /* HEART PARTICLES */
        .particle { position: fixed; pointer-events: none; z-index: 1000; animation: fadeUp 2s ease-out forwards; }
        @keyframes fadeUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }

    </style>
</head>
<body>

    <div id="layer-finance">
        <div class="sidebar">
            <h2 style="letter-spacing: 2px;">FTU CORE</h2>
            <div style="margin-top: 50px;">
                <p style="color: #bbb; font-size: 0.7rem; font-weight: 700;">ACTIVE FILE</p>
                <p style="font-size: 0.9rem; margin-top: 5px;">Analysis_Report_K62.pdf</p>
            </div>
        </div>
        <div class="main-panel">
            <h4 style="color: var(--deep-pink); font-weight: 700;">SYSTEM SECURED</h4>
            <h1 style="font-size: 3.5rem; margin: 10px 0;">Corporate <br>Asset Valuation</h1>
            <div class="stat-grid">
                <div class="stat-card"><h3>NPV</h3><p>+1,250.00 USD</p></div>
                <div class="stat-card"><h3>IRR</h3><p>18.52%</p></div>
            </div>
            <button class="btn-unlock" onclick="wowTransition()">AUTHENTICATE ACCESS</button>
        </div>
    </div>

    <div id="layer-surprise">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 3rem; color: var(--deep-pink); margin-top: 20px;">Happy Graduation!</h1>
            <p style="color: #888; letter-spacing: 3px;">FOR MY DEAREST QUYNH HUONG</p>
        </div>

        <div class="polaroid-container" id="card3d">
            <div class="polaroid-card">
                <img src="huong.jpg" alt="Quynh Huong">
                <div class="disc-music" id="musicDisc">🎵</div>
                <p style="margin-top: 30px; font-weight: 700; color: #ddd; letter-spacing: 5px;">LỄ TỐT NGHIỆP 2026</p>
            </div>
        </div>

        <div class="nav-buttons" style="margin-top: 60px;">
            <button class="btn-magic" onclick="typeMessage()">Đọc lời nhắn bí mật 💌</button>
            <button class="btn-magic" onclick="toggleMusic()">Bật nhạc & Quay đĩa 🎵</button>
            <button class="btn-magic" onclick="heartExplosion()">Bắn tim tung tóe ✨</button>
        </div>

        <div class="message-box" id="typing-box">
            <p id="target-text" style="color: #bbb; font-style: italic;">Chờ Thy một chút, em đang viết lời nhắn cho chị...</p>
        </div>

        <audio id="bgMusic" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Hiệu ứng di chuyển 3D cho Polaroid
        const card = document.getElementById('card3d');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 20;
            const y = (window.innerHeight / 2 - e.pageY) / 20;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        function wowTransition() {
            const fLayer = document.getElementById('layer-finance');
            const sLayer = document.getElementById('layer-surprise');
            
            fLayer.style.opacity = '0';
            fLayer.style.transform = 'scale(1.1) blur(20px)';
            
            setTimeout(() => {
                fLayer.style.display = 'none';
                sLayer.style.display = 'block';
                setTimeout(() => { 
                    sLayer.style.opacity = '1'; 
                    heartExplosion(); // Tự động bắn tim khi mở
                }, 100);
            }, 1000);
        }

        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const disc = document.getElementById('musicDisc');
            if(music.paused) {
                music.play();
                disc.style.animationPlayState = 'running';
            } else {
                music.pause();
                disc.style.animationPlayState = 'paused';
            }
        }

        const fullMessage = "Cuối cùng cũng đến rồi lễ tốt nghiệp, ngày mà Quỳnh Hương thật sự trưởng thành.\n\nĐối với em, chị không chỉ là một người chị mà còn là một món quà vô cùng đặc biệt — Một món quà mà em nghĩ ông trời đã ban tặng em ❤️\n\nEm rất quý cái cách chị luôn rạng rỡ, bản lĩnh và nỗ lực hết mình vì đam mê. I love u a lot, u always be my sunshine. ☀️\n\nI wish u have a great journey ahead! Luôn tự tin và hạnh phúc như bây giờ chị nhé! Thương chị rất nhiều!";

        function typeMessage() {
            const box = document.getElementById('target-text');
            box.innerHTML = "";
            box.style.color = "#444";
            box.style.fontStyle = "normal";
            let i = 0;
            
            function typing() {
                if (i < fullMessage.length) {
                    box.innerHTML += fullMessage.charAt(i) === '\n' ? '<br>' : fullMessage.charAt(i);
                    i++;
                    setTimeout(typing, 40); // Tốc độ gõ chữ
                }
            }
            typing();
        }

        function heartExplosion() {
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.innerHTML = ['💖','🌸','✨','🍰'][Math.floor(Math.random()*4)];
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.top = Math.random() * 100 + 'vh';
                    p.style.fontSize = Math.random() * 20 + 20 + 'px';
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 2000);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
